name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt + clippy + test + build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system deps (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libasound2-dev

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: fmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test --all-targets

      - name: build --release
        run: cargo build --release

  wer:
    name: WER regression (ubuntu, moonshine-tiny)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: sudo apt-get install -y libasound2-dev

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-wer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-wer-

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: ~/.local/share/my-voice/models/moonshine-tiny
          key: model-tiny-${{ hashFiles('src/models.rs') }}

      - name: Download moonshine-tiny
        run: |
          echo 'model = "moonshine-tiny"' > /tmp/wer-ci.toml
          cargo run --features debug-tools -- --config /tmp/wer-ci.toml --download

      - name: Run WER harness
        env:
          MY_VOICE_WER_MODEL: moonshine-tiny
          MY_VOICE_WER_MAX: "0.5"
        run: cargo test --features debug-tools --test wer -- --ignored --nocapture
